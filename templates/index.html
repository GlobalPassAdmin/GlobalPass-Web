<section id="services" class="py-16 md:py-24 bg-light">
    <div class="container mx-auto px-4 lg:px-8">
        <div class="text-center mb-12">
            <h2 class="text-dark font-bold text-3xl md:text-4xl mb-4">خدماتنا العالمية</h2>
        </div>
        
        <div id="serviceGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
            {% for s in services %}
            <div class="bg-white rounded-xl shadow-lg p-6 hover:shadow-xl transition-shadow">
                <div class="flex items-center gap-3 mb-3">
                    <i class="fas fa-passport text-[#0056b3] text-xl"></i>
                    <h3 class="font-bold text-xl text-dark">{{ s.title }}</h3>
                </div>
                <p class="text-secondary mb-4">{{ s.description }}</p>
                <div class="flex justify-between items-center mt-auto">
                    <span class="font-bold text-[#0056b3]">{{ s.price }} $</span>
                    <a href="#order" class="bg-[#0056b3] text-white px-4 py-2 rounded-lg font-medium hover:bg-opacity-90">اطلب الآن</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
