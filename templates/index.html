<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>PathVantage Global | بوابة الخدمات العالمية</title>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container"><a class="navbar-brand">PATHVANTAGE</a></div>
    </nav>
    <div class="container">
        <div class="row">
            {% for s in services %}
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5>{{ s.title }}</h5>
                        <p class="text-muted">{{ s.country }}</p>
                        <p class="fw-bold text-primary">{{ s.price }}$</p>
                        <button class="btn btn-dark w-100">اطلب الآن</button>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
